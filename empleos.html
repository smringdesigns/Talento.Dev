<!DOCTYPE html>
<html lang="es">

<head>
    <title>Talento.Dev - Empleos</title>
    <meta charset="UTF-8">
    <meta name="description" content="Encuentra las mejores ofertas de trabajo para desarrolladores en DevJobs.">
    <link rel="stylesheet" href="styles.css">

    <script defer src="scripts.js"></script>
</head>

<body>
    <header>
        <h1>
            <svg
                fill="none" stroke="currentColor"
                stroke-linecap="round" stroke-linejoin="round"
                stroke-width="2"
                viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
            </svg>
            
            Talento.Dev
        </h1>

        <nav>
            <a href="index.html">Inicio</a>
            <a href="empleos.html">Empleos</a>
            <a href="#">Empresas</a>
            <a href="#">Salarios</a>
        </nav>
        <div>
            <a href="">Publicar un empleo</a>
            <a href="">Iniciar Sesión</a>
        </div>
    </header>

    <main>
        <section class="jobs-search">
            <h1>Encuentra tu próximo trabajo</h1>
            <p>Explora miles de oportunidades en el sector tecnológico</p>

            <form role="search">
                <div class="search-bar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1" stroke-linecap="round"
                        stroke-linejoin="round"
                        class="icon icon-tabler icons-tabler-outline icon-tabler-search">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
                        <path d="M21 21l-6 -6" />
                    </svg>
                    <input id="empleos-search-input" required type="text" placeholder="Buscar trabajos, empresas o habilidades">
                </div>

                <div class="search-filters">
                    <!-- Filtro de tecnología -->
                     <select name="technology" id="filter-technology">
                        <option value="">Seleccionar tecnología</option>
                        <option value="javascript">JavaScript</option>
                        <option value="python">Python</option>
                        <option value="java">Java</option>
                        <option value="react">React</option>
                        <option value="nodejs">Node.js</option>
                        <option value="oracle">Oracle</option>
                     </select>

                    <!-- Filtro de Ubicación -->
                    <select name="location" id="filter-modality">
                        <option value="">Modalidad</option>
                        <option value="remoto">Remoto</option>
                        <option value="presencial">Presencial</option>
                        <option value="hibrido">Híbrido</option>
                    </select>

                    <!-- Filtro nivel de experiencia -->
                    <select name="experience-level" id="filter-experience-level">
                        <option value="">Nivel de experiencia</option>
                        <option value="junior">Junior</option>
                        <option value="mid">Mid-level</option>
                        <option value="senior">Senior</option>
                        <option value="lead">Lead</option>
                    </select>

                    <span id="filter-selected-value"></span>
                </div>
            </form>
        </section>

        <section class="jobs-results">
            <h2>Resultados de la búsqueda</h2>

            <div class="jobs-listings">
                <!-- Aquí se cargarán dinámicamente las ofertas de trabajo -->
                 
            </div>
        </section>

        <nav class="pagination">
            <a href="#" aria-label="Página anterior">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" 
                    fill="none" stroke="currentColor" 
                    stroke-width="2" 
                    stroke-linecap="round" 
                    stroke-linejoin="round">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M15 6l-6 6l6 6" />
                </svg>
            </a>
            <a class="is-active" href="#">1</a>
            <a href="#">2</a>
            <a href="#">3</a>
            <a href="#">3</a>
            <a href="#">4</a>
            <a href="#">5</a>
            <a href="#" aria-label="Página siguiente">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" 
                    fill="none" stroke="currentColor" 
                    stroke-width="2" 
                    stroke-linecap="round" 
                    stroke-linejoin="round">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M9 6l6 6l-6 6" />
                </svg>
            </a>
        </nav>

    </main>

     <footer>
        <small>

        </small>
    </footer>
    
</body>
